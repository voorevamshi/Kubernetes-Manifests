apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: "uat-dev"
  region: "us-east-1"
  version: "1.29"

managedNodeGroups:
  - name: managed-ng-1
    instanceTypes: ["t3.medium"]
    desiredCapacity: 2
    minSize: 2
    maxSize: 5
    ssh:
      enableSsm: true
    labels:
      role: worker
    tags:
      Name: "eks-managed-node"

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns
